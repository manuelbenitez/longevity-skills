name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: pytest tests/ -v
        # API-bound tests are skipped automatically; pure unit + integration tests run here.
      - name: Validate every JSON in data/
        run: |
          if [ -d data ]; then
            python scripts/lib.py validate-all data || true
          fi
